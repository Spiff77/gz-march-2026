name: Java CI with Maven

on:
  push:
    branches: [ main ]
    paths:
      - 'java-spring/6-github-actions/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'java-spring/6-github-actions/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package
        working-directory: java-spring/6-github-actions

      - name: Run tests
        run: mvn -B test
        working-directory: java-spring/6-github-actions
