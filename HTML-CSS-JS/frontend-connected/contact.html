<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Contact Form</h1>
    <nav>
        <a href="index.html">Contact us</a>
    </nav>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cumque labore enim deleniti a, consequuntur distinctio, consectetur quam ullam illum praesentium dolorem voluptatem fugiat fuga, nobis vero harum? Dolorem, voluptatum? In.</p>


    <form action="#">
        <div>
            <label for="idFn">Your firstname</label>
            <input type="text" name="firstname" id="idFn">
        </div>
        <div>
            <label for="idLn">Your lastname</label>
            <input type="text" name="lastname" id="idLn">
        </div>
        <div>
            <label for="idPass">Password</label>
            <input type="password" name="pass" id="idPass">
        </div>
        <div>
            <label for="idheight">Your height</label>
            <input type="number" name="height" id="idheight">
        </div>
        <div>
            <label for="idTel">Your phone</label>
            <input type="tel" name="tel" id="idTel">
        </div>
        <div>
            <label for="idMessage">Your message</label>
            <textarea id="idMessage"></textarea>
        </div>
        <!-- button, select-->
        <div>
            <h4>Music style</h4>
            <label for="hiphop">Hip Hop</label>
            <input type="checkbox" value="HH" id="hiphop" name="musicstyle">

            <label for="rock">Rock</label>
            <input type="checkbox" value="RC" id="rock" name="musicstyle">

            <label for="KPop">KPop</label>
            <input type="checkbox" value="KP" id="KPop" name="musicstyle">
        </div>

        <div>
            <h4>Music style</h4>
            <label for="hiphop">Hip Hop</label>
            <input type="radio" value="HH" id="hiphop" name="musicstyle">

            <label for="rock">Rock</label>
            <input type="radio" value="RC" id="rock" name="musicstyle">

            <label for="KPop">KPop</label>
            <input type="radio" value="KP" id="KPop" name="musicstyle">
        </div>

        <button type="button">Hey</button>
        <button type="submit">OK</button>

    </form>
</body>
</html>
